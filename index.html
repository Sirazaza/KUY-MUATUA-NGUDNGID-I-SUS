// ── setup ──────────────────────────────────────────────────────────────────
const cv = document.getElementById('c');
const W  = cv.width  = window.innerWidth;
const H  = cv.height = window.innerHeight;
const cx = cv.getContext('2d');
cx.imageSmoothingEnabled = false;

const imgs = {};
let loaded=0, total=Object.keys(SPRITES).length;
for(const [k,src] of Object.entries(SPRITES)){
  const i=new Image();
  i.onload=()=>{ if(++loaded===total) init(); };
  i.src=src; imgs[k]=i;
}

// ── iso grid ──────────────────────────────────────────────────────────────
// Grid: 12 cols (left-right) x 9 rows (front-back)
// Origin = back-left corner of room
const COLS=12, ROWS=9;
const TW = Math.min(W,H)*0.135;   // half-tile width
const TH = TW * 0.50;             // half-tile height (iso squish)
// Screen origin: back corner of room
const OX = W * 0.50;
const OY = H * 0.295;

// iso grid (col=right, row=down) to screen
function g(col,row){ return { x: OX+(col-row)*TW*0.5, y: OY+(col+row)*TH*0.5 }; }

// ── palette ───────────────────────────────────────────────────────────────
const C = {
  sky0:'#cde8f8', sky1:'#fce0f0',
  wallB:'#fef2fa', wallBDot:'rgba(220,150,185,.15)',
  wallL:'#fae6f4', wallR:'#f5dff0',
  edge:'#f0cade',
  flA:'#fff8fc', flB:'#faeef7', flE:'#f0d8eb',
  bedF:'#fbd4e8', bedM:'#fff5fb', bedBl:'#ffb8d8', bedHB:'#f8d0e8',
  shF:'#fce4f2', shT:'#fff8fc',
  dkF:'#fbd0ea', dkT:'#fff6fc',
  rugA:'rgba(255,185,225,.45)', rugB:'rgba(255,145,205,.45)',
  pot:'#f5b8cc', potR:'#ffd0e0', soil:'#c89068',
  lDk:'#58b556', lMd:'#70d26e', lLt:'#94e892', vine:'#68c266',
};

// ── helpers ───────────────────────────────────────────────────────────────
function poly(pts, fill, stroke, lw=1){
  cx.beginPath(); cx.moveTo(pts[0].x,pts[0].y);
  pts.slice(1).forEach(p=>cx.lineTo(p.x,p.y)); cx.closePath();
  if(fill){cx.fillStyle=fill;cx.fill();}
  if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw;cx.stroke();}
}

// top face of iso box at grid (col,row) size (dc x dr) lifted h px
function fTop(col,row,dc,dr,h=0){
  return [g(col,row),g(col+dc,row),g(col+dc,row+dr),g(col,row+dr)]
         .map(p=>({x:p.x,y:p.y-h}));
}

// left face (col-side) of iso box
function fLeft(col,row,dr,h,boxH){
  const a=g(col,row), b=g(col,row+dr);
  return [{x:a.x,y:a.y-h},{x:b.x,y:b.y-h},{x:b.x,y:b.y-h+boxH},{x:a.x,y:a.y-h+boxH}];
}

// right face (row-side) of iso box  
function fRight(col,row,dc,h,boxH){
  const a=g(col,row), b=g(col+dc,row);
  return [{x:a.x,y:a.y-h},{x:b.x,y:b.y-h},{x:b.x,y:b.y-h+boxH},{x:a.x,y:a.y-h+boxH}];
}

function rr(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}

function cloud(x,y,s){
  cx.save(); cx.fillStyle='rgba(255,255,255,.84)';
  cx.beginPath();
  cx.arc(x,y,s*.5,0,Math.PI*2); cx.arc(x+s*.43,y+s*.06,s*.35,0,Math.PI*2);
  cx.arc(x-s*.36,y+s*.10,s*.30,0,Math.PI*2); cx.arc(x+s*.08,y+s*.26,s*.33,0,Math.PI*2);
  cx.fill(); cx.restore();
}

// ── ROOM ─────────────────────────────────────────────────────────────────
const WH = TH*5.6;   // wall height px

function drawRoom(){
  // sky
  const sg=cx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,C.sky0); sg.addColorStop(1,C.sky1);
  cx.fillStyle=sg; cx.fillRect(0,0,W,H);
  cloud(W*.10,H*.07,54); cloud(W*.22,H*.04,36);
  cloud(W*.77,H*.06,48); cloud(W*.89,H*.11,32);

  const C0=g(0,0), CX=g(COLS,0), CY=g(0,ROWS), CXY=g(COLS,ROWS);

  // ── back wall ──
  poly([{x:C0.x,y:C0.y-WH},{x:CX.x,y:CX.y-WH},{x:CX.x,y:CX.y},{x:C0.x,y:C0.y}], C.wallB, C.edge);
  // wallpaper dots – clipped to back wall
  cx.save();
  cx.beginPath(); cx.moveTo(C0.x,C0.y-WH); cx.lineTo(CX.x,CX.y-WH); cx.lineTo(CX.x,CX.y); cx.lineTo(C0.x,C0.y); cx.clip();
  for(let dx=C0.x+22;dx<CX.x;dx+=38) for(let dy=C0.y-WH+20;dy<C0.y;dy+=38){
    cx.fillStyle=C.wallBDot; cx.beginPath(); cx.arc(dx,dy,4,0,Math.PI*2); cx.fill();
  }
  cx.restore();

  // ── left wall ──
  poly([{x:C0.x,y:C0.y-WH},{x:CY.x,y:CY.y-WH},{x:CY.x,y:CY.y},{x:C0.x,y:C0.y}], C.wallL, C.edge);
  // ── right wall ──
  poly([{x:CX.x,y:CX.y-WH},{x:CXY.x,y:CXY.y-WH},{x:CXY.x,y:CXY.y},{x:CX.x,y:CX.y}], C.wallR, C.edge);

  // skirting
  cx.strokeStyle='rgba(235,175,210,.55)'; cx.lineWidth=2;
  cx.beginPath(); cx.moveTo(CY.x,CY.y-8); cx.lineTo(C0.x,C0.y-8); cx.lineTo(CX.x,CX.y-8); cx.lineTo(CXY.x,CXY.y-8); cx.stroke();

  // ── WINDOW – properly iso on back wall ──
  // Window sits at column 7-10, at wall height 55-90% from floor
  drawWindow();

  // ── floor ──
  for(let r=ROWS-1;r>=0;r--) for(let c=0;c<COLS;c++){
    poly([g(c,r),g(c+1,r),g(c+1,r+1),g(c,r+1)], (c+r)%2===0?C.flA:C.flB, C.flE, .7);
  }

  // ── rug ──
  drawRug();

  // ── furniture (back→front order) ──
  drawBed(0.8, 0.3);
  drawShelf(4.0, 0.2);
  drawDesk(8.2, 0.3);

  // ── plants ──
  const pM = g(2.0, 4.5); drawPlant(pM.x, pM.y, 'monstera', 40);
  const pC = g(5.8, 7.8); drawPlant(pC.x, pC.y, 'cactus', 26);
  const pS = g(0.4, 5.2); drawPlant(pS.x, pS.y, 'small', 20);
  // pothos ON DESK – positioned at desk top surface
  const deskTopPt = g(9.2, 1.0);
  const deskBoxH  = TH*1.2;
  drawPlant(deskTopPt.x, deskTopPt.y - deskBoxH, 'pothos', 18);
}

function drawWindow(){
  // Window on the back wall between col 7-10
  // Back wall: cols go left to right, all at row=0
  // We'll draw the window frame as an iso-projected rectangle on the back wall plane
  const wc0=7, wc1=10.5;   // column range
  const wYbot = WH*0.35;   // distance from floor (px)
  const wYtop = WH*0.80;

  const p0 = g(wc0, 0); const p1 = g(wc1, 0);

  // Window frame coords (on back wall plane)
  const fl = { x:p0.x, y:p0.y - wYbot };
  const fr = { x:p1.x, y:p1.y - wYbot };
  const tl = { x:p0.x, y:p0.y - wYtop };
  const tr = { x:p1.x, y:p1.y - wYtop };

  // Outer frame
  cx.save();
  cx.shadowColor='rgba(160,210,255,.4)'; cx.shadowBlur=18;
  cx.fillStyle='#f0c8de';
  poly([
    {x:tl.x-3,y:tl.y-3},{x:tr.x+3,y:tr.y-3},
    {x:fr.x+3,y:fr.y+3},{x:fl.x-3,y:fl.y+3}
  ], '#f0c8de');
  cx.restore();

  // Sky fill
  const sg = cx.createLinearGradient(tl.x, tl.y, fl.x, fl.y);
  sg.addColorStop(0,'#bce4ff'); sg.addColorStop(1,'#ddf0ff');
  cx.fillStyle=sg;
  cx.beginPath(); cx.moveTo(tl.x,tl.y); cx.lineTo(tr.x,tr.y); cx.lineTo(fr.x,fr.y); cx.lineTo(fl.x,fl.y); cx.closePath(); cx.fill();

  // Clip and draw clouds inside window
  cx.save();
  cx.beginPath(); cx.moveTo(tl.x,tl.y); cx.lineTo(tr.x,tr.y); cx.lineTo(fr.x,fr.y); cx.lineTo(fl.x,fl.y); cx.closePath(); cx.clip();
  const mxW = (tl.x+tr.x)*.5, myW = (tl.y+fl.y)*.5;
  const wSize = (fr.x-fl.x)*.18;
  cloud(mxW-wSize*.8, myW-wSize*.3, wSize);
  cloud(mxW+wSize*.4, myW+wSize*.5, wSize*.75);
  cx.restore();

  // Cross dividers – following iso slope
  const midC = (wc0+wc1)*.5;
  const midPH = (wYtop+wYbot)*.5;
  const pm = g(midC,0);
  const midX = pm.x, midY = pm.y - midPH;
  // horizontal bar
  poly([{x:fl.x,y:midY},{x:fr.x,y:midY},{x:fr.x,y:midY+3},{x:fl.x,y:midY+3}], '#f0c0d8');
  // vertical bar
  poly([{x:midX-2,y:tl.y},{x:midX+2,y:tr.y},{x:midX+2,y:fr.y},{x:midX-2,y:fl.y}], '#f0c0d8');
}

function drawRug(){
  const pts=[g(3,3),g(9,3),g(9,8.5),g(3,8.5)];
  const rg=cx.createLinearGradient(pts[0].x,pts[0].y,pts[2].x,pts[2].y);
  rg.addColorStop(0,C.rugA); rg.addColorStop(1,C.rugB);
  poly(pts,rg);
  cx.strokeStyle='rgba(235,135,185,.55)'; cx.lineWidth=1.8;
  cx.setLineDash([5,4]);
  cx.beginPath(); cx.moveTo(pts[0].x,pts[0].y); pts.slice(1).forEach(p=>cx.lineTo(p.x,p.y)); cx.closePath(); cx.stroke();
  cx.setLineDash([]);
  const mx=(pts[0].x+pts[2].x)*.5, my=(pts[0].y+pts[2].y)*.5;
  cx.fillStyle='rgba(230,130,180,.28)'; cx.font='24px serif'; cx.textAlign='center';
  cx.fillText('🐾',mx,my+6); cx.textAlign='left';
}

// ── BOX utility: draws left + right face of iso box ──
function isoBox(col,row,dc,dr,h, topC, leftC, rightC){
  // left face (col edge)
  poly(fLeft(col,row,dr,0,h), leftC, C.edge, .7);
  // right face (row edge)
  poly(fRight(col,row+dr,dc,0,h), rightC, C.edge, .7);
  // top face
  poly(fTop(col,row,dc,dr,h), topC, C.edge, .7);
}

function drawBed(col,row){
  const BH=TH*1.3, BW=3.0, BD=4.2;
  isoBox(col,row,BW,BD,BH, C.bedM,'#fdd8ec','#f8cce6');
  // blanket: covers lower portion of top
  poly(fTop(col,row+BD*.38,BW,BD*.62,BH), C.bedBl,'#f0a8c8',.8);
  // heart on blanket
  const bc=[(g(col+BW*.5,row+BD*.7))].map(p=>({x:p.x,y:p.y-BH}))[0];
  cx.fillStyle='rgba(255,255,255,.5)'; cx.font='10px serif'; cx.textAlign='center';
  cx.fillText('♡',bc.x,bc.y+3); cx.textAlign='left';
  // headboard
  const hbH=TH*2.8;
  const h0=g(col,row), h1=g(col+BW,row);
  poly([
    {x:h0.x,y:h0.y-BH},{x:h1.x,y:h1.y-BH},
    {x:h1.x,y:h1.y-BH-hbH},{x:h0.x,y:h0.y-BH-hbH}
  ], C.bedHB, C.edge, .8);
  // pillow
  poly(fTop(col+.25,row+.25,BW-.5,BD*.25,BH), '#ffe8f6','#f0c8de',.7);
}

function drawShelf(col,row){
  const SH=TH*2.3, SW=3.2, SD=0.85;
  isoBox(col,row,SW,SD,SH, C.shT,'#fce0f0','#f8d8ec');

  // Books drawn ON THE ISO FRONT FACE (right face, since we look at it)
  // Front face: from g(col,row+SD) to g(col+SW,row+SD), height=SH
  // We need to draw books as iso-projected rectangles on this face
  const bkColors=['#ff8ab0','#a8d8ea','#b8f0c8','#ffe0a0','#d4b0f0','#ffb0cc','#b0d8ff','#f4c8a0'];
  const faceL = g(col, row+SD);
  const faceR = g(col+SW, row+SD);
  // face is a parallelogram; step across it
  const steps = bkColors.length;
  const dx = (faceR.x - faceL.x) / steps;
  const dy = (faceR.y - faceL.y) / steps;
  
  bkColors.forEach((clr, i) => {
    const bh = SH * (.52 + (i%3)*.08);
    // bottom-left corner of this book on the face
    const blx = faceL.x + i*dx;
    const bly = faceL.y + i*dy;
    // 4 corners: bottom-left, bottom-right, top-right, top-left
    const bw_dx = dx*0.88, bw_dy = dy*0.88; // book width along face
    poly([
      {x:blx,        y:bly},
      {x:blx+bw_dx,  y:bly+bw_dy},
      {x:blx+bw_dx,  y:bly+bw_dy - bh},
      {x:blx,        y:bly - bh},
    ], clr, 'rgba(255,255,255,.35)', .5);
  });

  // decor on top surface
  const tp = g(col+SW*.5, row);
  cx.font='13px serif'; cx.textAlign='center';
  cx.fillText('🌸', tp.x-14, tp.y-SH-4);
  cx.fillText('⭐', tp.x+16, tp.y-SH-3);
  cx.textAlign='left';
}

function drawDesk(col,row){
  const DH=TH*1.2, DW=2.0, DD=2.6;
  isoBox(col,row,DW,DD,DH, C.dkT,'#fbd4ea','#f5cce4');

  // Mirror on desktop – positioned on the top face
  const mp = g(col+DW*.4, row);
  const mx=mp.x, my=mp.y-DH;
  cx.fillStyle='#f8d0e4';
  rr(mx-18,my-62,36,58,10); cx.fill();
  const mg=cx.createLinearGradient(mx-14,my-58,mx+14,my-8);
  mg.addColorStop(0,'#eaf6ff'); mg.addColorStop(1,'#d2eeff');
  cx.fillStyle=mg; rr(mx-14,my-58,28,50,6); cx.fill();

  // Perfume
  cx.fillStyle='#ffb8d8'; rr(mx+22,my-28,10,24,4); cx.fill();
  cx.fillStyle='#ffd8ec'; rr(mx+24,my-35,6,9,3); cx.fill();
  cx.fillStyle='#c0c0c0'; cx.fillRect(mx+26,my-38,2,5);
}

// ── plants ───────────────────────────────────────────────────────────────
function pot(x,y,r){
  cx.fillStyle=C.pot;
  cx.beginPath(); cx.moveTo(x-r,y-28); cx.lineTo(x+r,y-28); cx.lineTo(x+r*.7,y); cx.lineTo(x-r*.7,y); cx.closePath(); cx.fill();
  cx.fillStyle=C.potR; rr(x-r-3,y-34,(r+3)*2,10,4); cx.fill();
  cx.fillStyle=C.soil; cx.beginPath(); cx.ellipse(x,y-30,r-2,5,0,0,Math.PI*2); cx.fill();
}

function drawPlant(x,y,type,r){
  if(type==='monstera'){
    pot(x,y,r*.8);
    const stems=[{dx:-8,dy:-55,a:-.5,s:r*1.1},{dx:14,dy:-68,a:.6,s:r},{dx:-22,dy:-90,a:-.7,s:r*1.25},{dx:20,dy:-85,a:.8,s:r*1.05}];
    cx.strokeStyle=C.vine; cx.lineWidth=2;
    stems.forEach(s=>{cx.beginPath();cx.moveTo(x,y-30);cx.lineTo(x+s.dx,y+s.dy);cx.stroke();});
    stems.forEach(s=>monsteraLeaf(x+s.dx,y+s.dy,s.s,s.a));
  }else if(type==='cactus'){
    pot(x,y,r*.8);
    cx.fillStyle=C.lDk; rr(x-r*.55,y-r*3.4,r*1.1,r*2.8,r*.55); cx.fill();
    cx.fillStyle=C.lMd; rr(x-r*.38,y-r*3.3,r*.76,r*2.4,r*.38); cx.fill();
    cx.fillStyle=C.lDk; rr(x-r*1.3,y-r*2.6,r*.9,r*1.2,r*.45); cx.fill(); rr(x+r*.4,y-r*2.4,r*.9,r*1.1,r*.45); cx.fill();
    cx.fillStyle=C.lMd; rr(x-r*1.15,y-r*2.5,r*.6,r*.9,r*.3); cx.fill(); rr(x+r*.55,y-r*2.3,r*.6,r*.85,r*.3); cx.fill();
    cx.strokeStyle='rgba(220,245,215,.7)'; cx.lineWidth=1;
    for(let sy=y-r*3.1;sy<y-r*.3;sy+=r*.52){cx.beginPath();cx.moveTo(x-r*.4,sy);cx.lineTo(x-r*.75,sy-4);cx.stroke();cx.beginPath();cx.moveTo(x+r*.4,sy);cx.lineTo(x+r*.75,sy-4);cx.stroke();}
    cx.font=`${r*.6}px serif`; cx.textAlign='center'; cx.fillText('🌸',x,y-r*3.5); cx.textAlign='left';
  }else if(type==='pothos'){
    pot(x,y,r*.7);
    for(let v=0;v<4;v++){
      const vx=x-r*.9+v*r*.6, vLen=r*1.3+v*r*.45;
      cx.strokeStyle=[C.vine,C.lDk,C.lMd,C.vine][v]; cx.lineWidth=1.5;
      cx.beginPath(); cx.moveTo(vx,y-18);
      for(let s=0;s<vLen;s+=7) cx.lineTo(vx+Math.sin(s*.45+v)*7,y-18+s);
      cx.stroke();
      const lx=vx+Math.sin(vLen*.45+v)*7, ly=y-18+vLen;
      cx.fillStyle=C.lMd; cx.beginPath(); cx.ellipse(lx,ly,8,5,Math.PI*.3*v,0,Math.PI*2); cx.fill();
    }
  }else if(type==='small'){
    pot(x,y,r*.75);
    cx.fillStyle=C.lDk; cx.beginPath(); cx.arc(x,y-r*2.2,r,0,Math.PI*2); cx.fill();
    cx.fillStyle=C.lMd; cx.beginPath(); cx.arc(x-r*.5,y-r*2.5,r*.65,0,Math.PI*2); cx.fill(); cx.beginPath(); cx.arc(x+r*.6,y-r*2.3,r*.6,0,Math.PI*2); cx.fill();
    cx.fillStyle=C.lLt; cx.beginPath(); cx.arc(x+r*.1,y-r*2.7,r*.45,0,Math.PI*2); cx.fill();
    ['#ff90b0','#ffd060','#b090ff'].forEach((c,i)=>{cx.fillStyle=c;cx.font=`${r*.55}px serif`;cx.textAlign='center';cx.fillText('✿',x-r*.55+i*r*.6,y-r*2.6-r*.5);cx.textAlign='left';});
  }
}

function monsteraLeaf(x,y,size,angle){
  cx.save(); cx.translate(x,y); cx.rotate(angle);
  cx.fillStyle=C.lDk; cx.beginPath(); cx.ellipse(0,-size*.5,size*.44,size*.72,0,0,Math.PI*2); cx.fill();
  cx.fillStyle=C.lMd; cx.beginPath(); cx.ellipse(0,-size*.48,size*.28,size*.52,0,0,Math.PI*2); cx.fill();
  cx.globalCompositeOperation='destination-out';
  [-1,1].forEach(s=>{cx.beginPath();cx.ellipse(s*size*.28,-size*.28,size*.11,size*.17,s*.5,0,Math.PI*2);cx.fill();});
  cx.globalCompositeOperation='source-over';
  cx.strokeStyle=C.lLt; cx.lineWidth=1.3; cx.beginPath(); cx.moveTo(0,0); cx.lineTo(0,-size); cx.stroke();
  cx.restore();
}

// ── SALMY – pixel art orange cat ─────────────────────────────────────────
// Drawn as explicit pixel blocks for a true pixel-art look
function drawSalmy(sx, sy){
  // Pixel size
  const P = 4;
  // Define the cat in a pixel grid. 
  // Each row is [color, col] pairs for filled pixels.
  // Colors: O=orange, L=light orange, W=white/cream, P=pink(nose/ear), B=brown(eye/outline), E=empty
  function px(x,y,col){ cx.fillStyle=col; cx.fillRect(sx+x*P, sy+y*P, P, P); }

  const O='#f5a030', L='#ffc060', W='#fff0d8', PK='#f09090', BN='#4a2000', BL='#000000', GY='#c87830';

  // --- body (sitting, ~16x20 grid) ---
  // Row by row from top (head) down
  // Head: row 0-7
  const cat=[
    // [row, col, color]
    // ears
    [0,3,O],[0,4,O],[0,11,O],[0,12,O],
    [1,2,O],[1,3,O],[1,4,PK],[1,5,O],[1,10,O],[1,11,PK],[1,12,O],[1,13,O],
    [2,2,O],[2,3,O],[2,4,O],[2,5,O],[2,10,O],[2,11,O],[2,12,O],[2,13,O],
    // head top
    [3,2,O],[3,3,O],[3,4,O],[3,5,O],[3,6,O],[3,7,O],[3,8,O],[3,9,O],[3,10,O],[3,11,O],[3,12,O],[3,13,O],
    // head mid - eyes
    [4,1,O],[4,2,O],[4,3,GY],[4,4,O],[4,5,O],[4,6,BN],[4,7,BN],[4,8,BN],[4,9,BN],[4,10,O],[4,11,O],[4,12,GY],[4,13,O],[4,14,O],
    [5,1,O],[5,2,O],[5,3,O],[5,4,O],[5,5,O],[5,6,BN],[5,7,W],[5,8,BN],[5,9,W],[5,10,O],[5,11,O],[5,12,O],[5,13,O],[5,14,O],
    [6,1,O],[6,2,O],[6,3,O],[6,4,O],[6,5,O],[6,6,BN],[6,7,BN],[6,8,BN],[6,9,BN],[6,10,O],[6,11,O],[6,12,O],[6,13,O],[6,14,O],
    // nose row
    [7,1,O],[7,2,O],[7,3,W],[7,4,W],[7,5,W],[7,6,W],[7,7,PK],[7,8,PK],[7,9,W],[7,10,W],[7,11,W],[7,12,W],[7,13,O],[7,14,O],
    // mouth
    [8,1,O],[8,2,O],[8,3,W],[8,4,W],[8,5,W],[8,6,PK],[8,7,W],[8,8,W],[8,9,PK],[8,10,W],[8,11,W],[8,12,W],[8,13,O],[8,14,O],
    [9,1,O],[9,2,O],[9,3,W],[9,4,W],[9,5,W],[9,6,W],[9,7,W],[9,8,W],[9,9,W],[9,10,W],[9,11,W],[9,12,W],[9,13,O],[9,14,O],
    // neck/chest
    [10,2,O],[10,3,O],[10,4,W],[10,5,W],[10,6,W],[10,7,W],[10,8,W],[10,9,W],[10,10,W],[10,11,W],[10,12,O],[10,13,O],
    // body
    [11,1,O],[11,2,O],[11,3,O],[11,4,W],[11,5,W],[11,6,W],[11,7,W],[11,8,W],[11,9,W],[11,10,W],[11,11,O],[11,12,O],[11,13,O],
    [12,1,O],[12,2,O],[12,3,O],[12,4,W],[12,5,W],[12,6,W],[12,7,W],[12,8,W],[12,9,W],[12,10,W],[12,11,O],[12,12,O],[12,13,O],
    [13,0,O],[13,1,O],[13,2,O],[13,3,O],[13,4,O],[13,5,W],[13,6,W],[13,7,W],[13,8,W],[13,9,O],[13,10,O],[13,11,O],[13,12,O],[13,13,O],
    [14,0,O],[14,1,O],[14,2,O],[14,3,O],[14,4,O],[14,5,O],[14,6,O],[14,7,O],[14,8,O],[14,9,O],[14,10,O],[14,11,O],[14,12,O],[14,13,O],
    // paws + tail
    [15,0,O],[15,1,O],[15,2,L],[15,3,L],[15,4,O],[15,5,O],[15,6,O],[15,7,O],[15,8,O],[15,9,O],[15,10,L],[15,11,L],[15,12,O],[15,13,O],[15,15,O],[15,16,O],[15,17,O],
    [16,0,O],[16,1,L],[16,2,W],[16,3,L],[16,4,O],[16,10,L],[16,11,W],[16,12,L],[16,13,O],[16,14,O],[16,15,O],[16,16,O],[16,17,L],
    [17,1,L],[17,2,W],[17,3,L],[17,11,W],[17,12,L],[17,15,O],[17,16,L],[17,17,L],
    // tail (curling to right)
    [13,15,O],[13,16,O],
    [12,16,O],[12,17,O],
    [11,17,O],[11,18,L],
    [10,17,O],[10,18,L],
    [9,16,O],[9,17,L],
    [8,15,O],[8,16,L],
  ];

  // stripes (darker marks on head)
  const stripes=[[3,6,GY],[3,7,GY],[3,8,GY],[4,6,GY]];

  cat.forEach(([r,c,col])=>px(c,r,col));
  stripes.forEach(([r,c,col])=>px(c,r,col));

  // Name tag below
  cx.fillStyle='#ffb0d4';
  rr(sx+P*1, sy+P*18+4, P*14, P*4, 3); cx.fill();
  cx.fillStyle='white'; cx.font=`bold ${P*3}px Nunito,sans-serif`;
  cx.textAlign='center'; cx.fillText('Salmy', sx+P*8, sy+P*21+2); cx.textAlign='left';
}

// ── SPRITE ────────────────────────────────────────────────────────────────
const walkFrames=['walk1','walk2','walk4','walk5','walk6','walk7','walk8'];
const hurtFrames=['hurt1','hurt2','hurt3'];

const spr={
  x:W*.42, y:H*.76,
  state:'walk', frame:0, frameTimer:0,
  direction:1, vx:.55,
  hurtTimer:0, scale:1.0,
};

let hp=5;
const heartEls=document.querySelectorAll('.h');
function updateHearts(){ heartEls.forEach((h,i)=>h.classList.toggle('off',i>=hp)); }

function updateSprite(dt){
  const fps=spr.state==='hurt'?5:8;
  spr.frameTimer+=dt;
  if(spr.frameTimer>1000/fps){
    spr.frameTimer=0;
    spr.frame=spr.state==='hurt'?Math.min(spr.frame+1,hurtFrames.length-1):(spr.frame+1)%walkFrames.length;
  }
  if(spr.state==='hurt'){ spr.hurtTimer-=dt; if(spr.hurtTimer<=0){spr.state='walk';spr.frame=0;} return; }
  spr.x+=spr.vx*spr.direction;
  if(spr.x>W*.75||spr.x<W*.20) spr.direction*=-1;
}

function drawScene(){
  cx.clearRect(0,0,W,H);
  drawRoom();

  // Salmy pixel cat on rug
  const salP=g(6.8,6.2);
  drawSalmy(salP.x-32, salP.y-76);

  // Angel
  const key=spr.state==='hurt'?hurtFrames[spr.frame]:walkFrames[spr.frame];
  const img=imgs[key];
  if(img){
    const dw=img.naturalWidth*spr.scale, dh=img.naturalHeight*spr.scale;
    cx.save();
    cx.globalAlpha=.12; cx.fillStyle='#b090b0';
    cx.beginPath(); cx.ellipse(spr.x,spr.y+4,dw*.25,6,0,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
    if(spr.state==='walk'&&spr.direction===-1){
      cx.scale(-1,1); cx.drawImage(img,-spr.x-dw*.5,spr.y-dh,dw,dh);
    } else {
      cx.drawImage(img,spr.x-dw*.5,spr.y-dh,dw,dh);
    }
    cx.restore();
  }
}

// ── click ─────────────────────────────────────────────────────────────────
cv.addEventListener('click',e=>{
  if(spr.state==='hurt') return;
  const img=imgs[walkFrames[spr.frame]];
  const dw=(img?.naturalWidth||75)*spr.scale, dh=(img?.naturalHeight||126)*spr.scale;
  const mx=e.clientX, my=e.clientY;
  if(mx>=spr.x-dw*.5&&mx<=spr.x+dw*.5&&my>=spr.y-dh&&my<=spr.y){
    spr.state='hurt'; spr.frame=0; spr.hurtTimer=hurtFrames.length*220;
    hp=Math.max(0,hp-1); updateHearts();
    if(hp===0) setTimeout(()=>{hp=5;updateHearts();},2500);
  }
});

// ── loop ──────────────────────────────────────────────────────────────────
function init(){
  let last=0;
  function loop(ts){ const dt=ts-last;last=ts; updateSprite(dt); drawScene(); requestAnimationFrame(loop); }
  requestAnimationFrame(loop);
}
